<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tableau de bord enseignant</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="css/teacher-dashboard.css">
</head>

<body>

  <div id="appRoot">
    <div id="workArea" class="dashboard-workarea">
      <div class="dashboard-shell">

        <section class="panel dashboard-hero">
          <div class="dashboard-hero-main">

            <div class="dashboard-title-row">
              <h1 class="dashboard-title">Mon tableau de bord</h1>
              <div id="teacherEmail" class="dashboard-subtitle">Chargement du compte…</div>
              <button class="btn" id="btnLogout" type="button">Déconnexion</button>
            </div>

            
          </div>
        </section>

        <div class="dashboard-grid">
          <section class="dashboard-column dashboard-column-left">
            <div class="panel dashboard-panel">
              <div class="dashboard-section-header">
                <div class="dashboard-section-title">Mes classes</div>

                <button id="btnAddClass" class="dashboard-add-btn" type="button"><span class="add-icon">+</span></button>
              </div>
              <div id="classesList" class="dashboard-class-list">
                <div style="color:var(--muted);">Chargement…</div>
              </div>
            </div>
          </section>

          <section class="dashboard-column dashboard-column-right">
            <div class="panel dashboard-panel">
              <div class="dashboard-config-header">
                <div class="dashboard-section-title">Configurations</div>

                <button class="btn primary" id="btnNewConfig" type="button">
                  Nouvelle configuration
                </button>
              </div>

              <div id="configsList" class="dashboard-config-list">
                <div style="color:var(--muted);">Sélectionne une classe pour voir ses configurations.</div>
              </div>
            </div>
          </section>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="js/teacher-dashboard.js"></script>

  <div id="classModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-title">Créer une classe</div>

      <input
        id="modalClassInput"
        type="text"
        placeholder="Code classe"
        class="dashboard-class-input modal-text-input"
      >

      <div class="modal-actions">
        <div id="modalMessage" class="modal-message"></div>

        <button id="btnModalCancel" class="btn" type="button">Annuler</button>
        <button id="btnModalCreate" class="btn primary" type="button">Créer</button>
      </div>
      
    </div>
  </div>

  <div id="editClassModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-title">Nom de la classe</div>

      <input
        id="editClassNameInput"
        type="text"
        placeholder="Nom affiché de la classe"
        class="dashboard-class-input modal-text-input"
      >

      <div class="modal-actions">
        <div id="editClassMessage" class="modal-message"></div>
        <button id="btnEditClassCancel" class="btn" type="button">Annuler</button>
        <button id="btnEditClassSave" class="btn primary" type="button">Enregistrer</button>
      </div>
    </div>
  </div>

  <div id="deleteClassModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-title">Supprimer la classe</div>

      <div id="deleteClassText" class="dashboard-message"></div>

      <div class="modal-actions">
        <div id="deleteClassMessage" class="modal-message"></div>
        <button id="btnDeleteClassCancel" class="btn" type="button">Annuler</button>
        <button id="btnDeleteClassConfirm" class="btn dashboard-danger-btn" type="button">Supprimer</button>
      </div>
    </div>
  </div>

</body>
</html>
