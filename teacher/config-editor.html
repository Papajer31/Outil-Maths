<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Éditeur de configuration</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/ui.css">
  <link rel="stylesheet" href="./css/common.css">
  <link rel="stylesheet" href="./css/config-editor.css">
  <link rel="stylesheet" href="./css/config-widgets.css">
</head>

<body>
  <div id="appRoot">
    <div id="workArea" class="cfg-page-shell">
      <div class="cfg-page">

        <header class="panel cfg-header">
          <div class="cfg-header-row cfg-header-row-top">
            <button class="btn cfg-back-btn" id="btnBackDashboard" type="button" aria-label="Retour au tableau de bord">↩</button>

            <div class="cfg-page-title">Éditeur d’activités</div>

            <div class="cfg-spacer"></div>

            <label class="cfg-inline-field cfg-name-field">
              <span>Nom de l’activité :</span>
              <input id="configNameInput" type="text" placeholder="Ex : Additions (période 1)" class="cfg-input">
            </label>
          </div>

          <div class="cfg-header-row cfg-header-row-bottom">
            <div class="cfg-header-mainline">
              <div class="cfg-module-block">
                <div class="cfg-field-label">Module</div>
                <div id="moduleSelectHost" class="cfg-module-select-host"></div>
              </div>

              <div id="activityDurationEstimate" class="cfg-estimate-inline">Durée estimée : —</div>
            </div>

            <div class="cfg-spacer"></div>

            <button class="btn cfg-save-btn" id="btnSaveConfig" type="button">Enregistrer</button>
          </div>

          <div id="editorMessage" class="cfg-editor-message"></div>
        </header>

        <section class="cfg-main">
          <aside class="panel cfg-tools-panel">
            <div class="cfg-panel-title">Outils</div>
            <div id="configRows" class="cfg-tools-list"></div>
          </aside>

          <section class="panel cfg-settings-panel">
            <div class="cfg-settings-header">
              <div class="cfg-panel-title" id="toolConfigTitle">Configuration de l’outil</div>

              <div class="cfg-global-inline">
                <span class="cfg-global-label">Temps entre les questions</span>
                <input id="questionTransitionSecInput" class="cfg-input cfg-input-small" type="number">
              </div>
            </div>

            <div id="toolConfigHost" class="cfg-tool-config-host">
              <div class="cfg-empty-state">
                Sélectionne un outil dans la colonne de gauche.
              </div>
            </div>
          </section>
        </section>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="./js/config-editor.js"></script>
</body>
</html>
