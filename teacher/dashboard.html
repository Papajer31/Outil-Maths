<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Tableau de bord enseignant</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/ui.css">
  <link rel="stylesheet" href="./css/common.css">
  <link rel="stylesheet" href="./css/dashboard.css">
</head>

<body>

  <div id="appRoot">
    <div id="workArea" class="dashboard-workarea">
      <div class="dashboard-shell">

        <section class="panel dashboard-hero">
          <div class="dashboard-hero-main">

            <div class="dashboard-title-row">
              <h1 class="dashboard-title">Mon tableau de bord</h1>
              <div id="accessCodeBox" class="dashboard-access-code-box hidden">
                <span class="dashboard-access-code-label">Code de connexion :</span>
                <span id="accessCodeValue" class="dashboard-access-code-value">—</span>
                <button class="dashboard-inline-edit-btn" id="btnEditAccessCode" type="button" title="Modifier le code de connexion" aria-label="Modifier le code de connexion">✎</button>
              </div>
              <div id="teacherEmail" class="dashboard-subtitle">Chargement du compte…</div>
              <button class="btn" id="btnLogout" type="button">Déconnexion</button>
            </div>

            
          </div>
        </section>

        <div class="dashboard-grid">
          <section class="dashboard-column dashboard-column-left">
            <div class="panel dashboard-panel">
              <div class="dashboard-section-header">
                <div class="dashboard-section-title">Ma classe</div>

                <button id="btnAddStudent" class="dashboard-add-btn" type="button"><span class="add-icon">+</span></button>
              </div>
              <div id="studentsList" class="dashboard-class-list">
                <div style="color:var(--muted);">Chargement…</div>
              </div>
            </div>
          </section>

          <section class="dashboard-column dashboard-column-right">
            <div class="panel dashboard-panel">
              <div class="dashboard-config-header">
                <div class="dashboard-section-title">Activités</div>

                <button class="btn primary" id="btnNewConfig" type="button">
                  Créer une activité
                </button>
              </div>

              <div id="configsList" class="dashboard-config-list">
                <div style="color:var(--muted);">Choisis un élève pour ouvrir son profil ou crée une activité.</div>
              </div>
            </div>
          </section>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="./js/dashboard.js"></script>

  <div id="accessCodeModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-title">Créer un code de connexion</div>

      <input
        id="accessCodeInput"
        type="text"
        placeholder="Code de connexion"
        class="dashboard-class-input modal-text-input"
      >

      <div class="modal-actions">
        <div id="modalMessage" class="modal-message"></div>

        <button id="btnModalCancel" class="btn" type="button">Annuler</button>
        <button id="btnModalCreate" class="btn primary" type="button">Créer</button>
      </div>
      
    </div>
  </div>

  <div id="deleteStudentModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-title">Supprimer l’élève</div>

      <div id="deleteStudentText" class="dashboard-message"></div>

      <div class="modal-actions">
        <div id="deleteStudentMessage" class="modal-message"></div>
        <button id="btnDeleteStudentCancel" class="btn" type="button">Annuler</button>
        <button id="btnDeleteStudentConfirm" class="btn dashboard-danger-btn" type="button">Supprimer</button>
      </div>
    </div>
  </div>

  <div id="deleteActivityModal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-title">Supprimer l’activité</div>

      <div id="deleteActivityText" class="dashboard-message"></div>

      <div class="modal-actions">
        <div id="deleteActivityMessage" class="modal-message"></div>
        <button id="btnDeleteActivityCancel" class="btn" type="button">Annuler</button>
        <button id="btnDeleteActivityConfirm" class="btn dashboard-danger-btn" type="button">Supprimer</button>
      </div>
    </div>
  </div>

</body>
</html>
