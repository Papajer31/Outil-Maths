<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Portail d’outils pédagogiques</title>

  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/ui.css">
  <link rel="stylesheet" href="./student/css/student.css">
  <link rel="stylesheet" href="./student/css/student-core.css">
</head>
<body>
  <div class="page-shell">
    <main class="page-main">
      <div id="studentApp" class="student-app">
        <section class="center-card" aria-labelledby="student-home-title">
          <div class="stack-lg text-center">
            <header class="stack-sm">
              <h1 id="student-home-title" class="title-xl">Entre le code de ta classe</h1>
            </header>

            <form id="studentHomeForm" class="home-form stack-md" novalidate>
              <label class="visually-hidden" for="classCode">Code de la classe</label>
              <input
                id="classCode"
                name="classCode"
                class="input-text"
                type="text"
                inputmode="text"
                autocomplete="off"
                autocapitalize="characters"
                spellcheck="false"
                maxlength="12"
                placeholder="ABC123"
              >

              <button type="submit" class="btn btn-primary">Connexion</button>

              <div id="homeMessage" class="home-message" aria-live="polite"></div>
            </form>
          </div>
        </section>
      </div>
    </main>

    <footer class="page-footer" id="studentFooter">
      <a class="footer-link" href="./teacher/login.html">Accès enseignant</a>
    </footer>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="./student/student-app.js"></script>
</body>
</html>
