<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Outils Maths</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="css/home.css">
</head>

<body class="home-body">

  <div id="appRoot">
    <div id="workArea" class="home-workarea">
      <div class="home-shell">

        <div class="home-grid">
          <section class="panel home-card">
            <div class="home-card-top">
              <div class="home-card-title">Code classe</div>
            </div>

            <div class="home-card-middle">
              <input
                id="classCodeInput"
                type="text"
                placeholder="Code classe"
                autocomplete="off"
                class="home-input"
              >
            </div>

            <div class="home-card-bottom">
              <button class="btn primary home-btn" id="btnGo" type="button">
                Activités
              </button>
            </div>
          </section>

          <section class="panel home-card">
            <div class="home-card-top">
              <div class="home-card-title">Enseignant</div>
            </div>

            <div class="home-card-middle">
              <div class="home-fields-stack">

                <div class="home-spacer"></div>
                
                <input
                  id="teacherEmailInput"
                  type="email"
                  placeholder="Email"
                  autocomplete="username"
                  class="home-input"
                >

                <input
                  id="teacherPasswordInput"
                  type="password"
                  placeholder="Mot de passe"
                  autocomplete="current-password"
                  class="home-input"
                >

                <div id="teacherLoginMessage" class="home-message"></div>
              </div>
            </div>

            <div class="home-card-bottom">
              <button class="btn primary home-btn" id="btnTeacherLogin" type="button">
                Connexion
              </button>
            </div>
          </section>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="js/home.js"></script>

</body>

</html>
